<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father Forge - Mission Control v3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Cosmic Background */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #0a0e27 100%);
            z-index: -2;
        }
        
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 40% 40%, rgba(138, 79, 209, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.05) 0%, transparent 50%);
            animation: nebulaDrift 20s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes nebulaDrift {
            0% { transform: translateX(-5%) translateY(-5%); }
            50% { transform: translateX(2%) translateY(3%); }
            100% { transform: translateX(-5%) translateY(-5%); }
        }
        
        /* Particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: drift 20s linear infinite;
        }
        
        @keyframes drift {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(10, 14, 39, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #DAA520);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .menu-toggle {
            display: none;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #FFD700;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 20px;
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 80px;
            width: 280px;
            height: calc(100vh - 80px);
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 215, 0, 0.1);
            padding: 24px;
            overflow-y: auto;
            z-index: 90;
            transition: transform 0.3s ease;
        }
        
        .sidebar.hidden {
            transform: translateX(-100%);
        }
        
        .nav-section {
            margin-bottom: 32px;
        }
        
        .nav-title {
            font-size: 12px;
            text-transform: uppercase;
            color: rgba(255, 215, 0, 0.6);
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .nav-item {
            display: block;
            padding: 12px 16px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 215, 0, 0.1);
            border-left-color: #FFD700;
            color: #FFD700;
        }
        
        /* Main Content */
        .main {
            margin-left: 280px;
            margin-top: 80px;
            padding: 40px;
            min-height: calc(100vh - 80px);
        }
        
        /* Milestones Widget */
        .milestones-widget {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }
        
        .milestones-title {
            font-size: 14px;
            text-transform: uppercase;
            color: rgba(255, 215, 0, 0.8);
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        .milestones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .milestone-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 16px;
            border-left: 4px solid;
        }
        
        .milestone-item.complete {
            border-left-color: #44CC44;
        }
        
        .milestone-item.in-progress {
            border-left-color: #4488FF;
        }
        
        .milestone-item.pending {
            border-left-color: #FFCC44;
        }
        
        .milestone-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .milestone-stat {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* Tiles Grid */
        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .tile {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid;
            border-image: linear-gradient(135deg, var(--tile-color), transparent) 1;
            border-radius: 12px;
            padding: 32px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at top-right, var(--tile-color), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .tile:hover {
            transform: translateY(-4px);
            border-color: var(--tile-color);
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.1);
        }
        
        .tile:hover::before {
            opacity: 0.15;
        }
        
        .tile-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .tile-title {
            font-size: 14px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .tile-stat {
            font-size: 36px;
            font-weight: 800;
            color: var(--tile-color);
            margin-bottom: 8px;
            line-height: 1;
        }
        
        .tile-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* Tile Colors */
        .tile.leads { --tile-color: #FF8844; }
        .tile.financials { --tile-color: #FF4444; }
        .tile.calendar { --tile-color: #4488FF; }
        .tile.templates { --tile-color: #44CC44; }
        .tile.content { --tile-color: #CC44FF; }
        .tile.system { --tile-color: #FFFFFF; }
        .tile.roadmap { --tile-color: #DAA520; }
        
        /* Content Calendar Page */
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        /* Kanban Board */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        
        .kanban-column {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            padding: 16px;
            min-height: 500px;
        }
        
        .column-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: rgba(255, 215, 0, 0.8);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .kanban-card {
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .kanban-card:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }
        
        .card-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .card-platforms {
            display: flex;
            gap: 6px;
            font-size: 11px;
        }
        
        .platform-badge {
            background: rgba(255, 215, 0, 0.2);
            padding: 2px 6px;
            border-radius: 3px;
            color: rgba(255, 215, 0, 0.8);
        }
        
        .add-idea-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px dashed rgba(255, 215, 0, 0.3);
            border-radius: 6px;
            color: rgba(255, 215, 0, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }
        
        .add-idea-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: rgba(255, 215, 0, 0.5);
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }
            
            .main {
                margin-left: 200px;
                padding: 24px;
            }
            
            .tiles-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            
            .sidebar {
                width: 100%;
                top: 80px;
            }
            
            .main {
                margin-left: 0;
                padding: 20px;
            }
            
            .tiles-grid {
                grid-template-columns: 1fr;
            }
            
            .kanban-board {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Cosmic Background -->
    <div class="cosmic-bg">
        <div class="nebula"></div>
        <div class="particles" id="particlesContainer"></div>
    </div>
    
    <!-- Header -->
    <div class="header">
        <h1>⚡ Father Forge Mission Control</h1>
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    </div>
    
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="nav-section">
            <div class="nav-title">Dashboard</div>
            <a class="nav-item active" onclick="showPage('dashboard')">Mission Control</a>
        </div>
        
        <div class="nav-section">
            <div class="nav-title">Operations</div>
            <a class="nav-item" onclick="navigateTo('index.html')">Leads</a>
            <a class="nav-item" onclick="navigateTo('financials.html')">Financials</a>
            <a class="nav-item" onclick="navigateTo('calendar.html')">Calendar</a>
            <a class="nav-item" onclick="navigateTo('templates.html')">Templates</a>
        </div>
        
        <div class="nav-section">
            <div class="nav-title">Strategy</div>
            <a class="nav-item" onclick="showPage('contentCalendar')">Content Calendar</a>
            <a class="nav-item" onclick="navigateTo('dashboard-v2.html')">Infinity Gauntlet</a>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main">
        <!-- Dashboard Page -->
        <div id="dashboard" class="page active">
            <!-- Milestones Widget -->
            <div class="milestones-widget">
                <div class="milestones-title">📊 Mission Gates</div>
                <div class="milestones-grid" id="milestonesGrid"></div>
            </div>
            
            <!-- Tiles Grid -->
            <div class="tiles-grid" id="tilesGrid"></div>
        </div>
        
        <!-- Content Calendar Page -->
        <div id="contentCalendar" class="page">
            <div style="margin-bottom: 24px;">
                <h2 style="font-size: 32px; margin-bottom: 8px;">📅 Content Strategy</h2>
                <p style="color: rgba(255, 255, 255, 0.6);">Plan, draft, schedule, and publish @progressdad content</p>
                <button class="add-idea-btn" onclick="openIdeaModal()" style="width: 200px; margin-top: 16px;">+ Add New Idea</button>
            </div>
            
            <div class="kanban-board" id="kanbanBoard"></div>
        </div>
    </div>

    <script>
        // Initialize particles
        function initParticles() {
            const container = document.getElementById('particlesContainer');
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        
        // Sidebar toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }
        
        // Navigation
        function navigateTo(url) {
            window.location.href = url;
        }
        
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        // Tiles data
        const tiles = [
            {
                id: 'leads',
                title: 'Leads',
                icon: '📊',
                class: 'leads',
                getStat: () => {
                    try {
                        const leads = JSON.parse(localStorage.getItem('leads') || '[]');
                        return leads.length || 0;
                    } catch {
                        return 0;
                    }
                },
                label: 'active prospects',
                link: 'index.html'
            },
            {
                id: 'financials',
                title: 'Financials',
                icon: '💰',
                class: 'financials',
                getStat: () => {
                    try {
                        const financials = JSON.parse(localStorage.getItem('financials') || '{}');
                        const mrrValue = financials.entries && financials.entries.length > 0 
                            ? financials.entries[financials.entries.length - 1].mrr || 0 
                            : 0;
                        const percentage = ((mrrValue / 42000) * 100).toFixed(0);
                        return mrrValue > 0 ? `${percentage}%` : '$0';
                    } catch {
                        return '$0';
                    }
                },
                label: 'of $42k goal',
                link: 'financials.html'
            },
            {
                id: 'calendar',
                title: 'Calendar',
                icon: '📅',
                class: 'calendar',
                getStat: () => {
                    const today = new Date();
                    const april25 = new Date(2026, 3, 25);
                    const daysRemaining = Math.ceil((april25 - today) / (1000 * 60 * 60 * 24));
                    return daysRemaining > 0 ? daysRemaining : 'LIVE';
                },
                label: 'days to milestone',
                link: 'calendar.html'
            },
            {
                id: 'templates',
                title: 'Templates',
                icon: '🎯',
                class: 'templates',
                getStat: () => '5',
                label: 'arsenal ready',
                link: 'templates.html'
            },
            {
                id: 'content',
                title: 'Content Calendar',
                icon: '📝',
                class: 'content',
                getStat: () => {
                    try {
                        const contentCalendar = JSON.parse(localStorage.getItem('contentCalendar') || '[]');
                        return contentCalendar.length || 0;
                    } catch {
                        return 0;
                    }
                },
                label: 'total ideas',
                link: null
            },
            {
                id: 'system',
                title: 'System',
                icon: '⚡',
                class: 'system',
                getStat: () => 'ONLINE',
                label: 'status',
                link: null
            },
            {
                id: 'roadmap',
                title: 'Roadmap',
                icon: '🛤️',
                class: 'roadmap',
                getStat: () => '4',
                label: 'gates open',
                link: null
            }
        ];
        
        // Render tiles
        function renderTiles() {
            const grid = document.getElementById('tilesGrid');
            grid.innerHTML = tiles.map(tile => `
                <div class="tile ${tile.class}" onclick="${tile.link ? `navigateTo('${tile.link}')` : `showPage('contentCalendar')`}">
                    <div class="tile-icon">${tile.icon}</div>
                    <div class="tile-title">${tile.title}</div>
                    <div class="tile-stat">${tile.getStat()}</div>
                    <div class="tile-label">${tile.label}</div>
                </div>
            `).join('');
        }
        
        // Milestones data
        const milestones = [
            { name: '$500 MRR', goal: 500, current: 0, status: 'complete', label: 'April 2026' },
            { name: '$10k MRR', goal: 10000, current: 0, status: 'in-progress', label: 'Dec 2026' },
            { name: '$42k MRR', goal: 42000, current: 0, status: 'pending', label: 'Nov 2027' }
        ];
        
        function updateMilestones() {
            try {
                const financials = JSON.parse(localStorage.getItem('financials') || '{}');
                if (financials.entries && financials.entries.length > 0) {
                    const current = financials.entries[financials.entries.length - 1].mrr || 0;
                    milestones[0].current = current;
                    milestones[1].current = current;
                    milestones[2].current = current;
                    
                    if (current >= 500) milestones[0].status = 'complete';
                    if (current >= 10000) milestones[1].status = 'complete';
                    if (current >= 42000) milestones[2].status = 'complete';
                }
            } catch (e) {}
        }
        
        function renderMilestones() {
            updateMilestones();
            const grid = document.getElementById('milestonesGrid');
            grid.innerHTML = milestones.map(m => `
                <div class="milestone-item ${m.status}">
                    <div class="milestone-name">${m.name}</div>
                    <div class="milestone-stat">${m.status === 'complete' ? '✅ Complete' : m.status === 'in-progress' ? '⏳ In Progress' : '⏸️ Goal'}</div>
                </div>
            `).join('');
        }
        
        // Content Calendar functions
        function loadContentCalendar() {
            try {
                const contentCalendar = JSON.parse(localStorage.getItem('contentCalendar') || '[]');
                renderKanban(contentCalendar);
            } catch {
                renderKanban([]);
            }
        }
        
        function renderKanban(items) {
            const stages = ['ideas', 'draft', 'scheduled', 'published'];
            const stageNames = { ideas: 'Ideas', draft: 'Draft', scheduled: 'Scheduled', published: 'Published' };
            
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = stages.map(stage => {
                const stageItems = items.filter(item => item.stage === stage);
                return `
                    <div class="kanban-column">
                        <div class="column-title">${stageNames[stage]} (${stageItems.length})</div>
                        ${stageItems.map(item => `
                            <div class="kanban-card">
                                <div class="card-title">${item.title}</div>
                                <div class="card-platforms">
                                    ${item.platforms.map(p => `<span class="platform-badge">${p}</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                        <button class="add-idea-btn" style="margin-top: auto;">+ Add</button>
                    </div>
                `;
            }).join('');
        }
        
        function openIdeaModal() {
            const title = prompt('Content title:');
            if (!title) return;
            
            const platforms = prompt('Platforms (comma-separated: YT, TikTok, IG, X):', 'IG, TikTok');
            
            const newIdea = {
                id: Date.now(),
                title,
                platforms: platforms.split(',').map(p => p.trim()),
                stage: 'ideas',
                createdAt: new Date().toISOString()
            };
            
            try {
                const contentCalendar = JSON.parse(localStorage.getItem('contentCalendar') || '[]');
                contentCalendar.push(newIdea);
                localStorage.setItem('contentCalendar', JSON.stringify(contentCalendar));
                loadContentCalendar();
            } catch (e) {
                alert('Error saving idea');
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initParticles();
            renderTiles();
            renderMilestones();
            loadContentCalendar();
            
            // Refresh stats every 5 seconds
            setInterval(() => {
                renderTiles();
                renderMilestones();
            }, 5000);
        });
    </script>
</body>
</html>
