<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father Forge - Arsenal Templates</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            color: #667eea;
        }
        
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .template-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .template-card:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-4px);
        }
        
        .template-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        
        .template-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .template-category {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        
        .template-description {
            flex: 1;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        
        .template-meta {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-bottom: 16px;
        }
        
        .template-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .message {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }
        
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .preview-modal.open {
            display: flex;
        }
        
        .preview-content {
            background: #1a1a2e;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
        }
        
        .preview-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .preview-content h2 {
            margin-bottom: 16px;
            color: #667eea;
        }
        
        .preview-content p {
            line-height: 1.6;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .preview-content ul,
        .preview-content ol {
            margin-left: 20px;
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .preview-content code {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Arsenal Templates</h1>
            <p class="subtitle">Ready-to-use frameworks for sales, proposals, and operations</p>
        </header>
        
        <div id="messageBox" class="message"></div>
        
        <div class="search-bar">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Search templates..."
                onkeyup="filterTemplates()"
            >
            
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterByCategory('all')">All</button>
                <button class="filter-btn" onclick="filterByCategory('email')">Email</button>
                <button class="filter-btn" onclick="filterByCategory('proposal')">Proposal</button>
                <button class="filter-btn" onclick="filterByCategory('playbook')">Playbook</button>
            </div>
        </div>
        
        <div class="template-grid" id="templateGrid">
            <!-- Templates will be populated here -->
        </div>
    </div>
    
    <!-- Preview Modal -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-content" id="previewContent">
            <button class="preview-close" onclick="closePreview()">✕</button>
            <div id="previewBody"></div>
        </div>
    </div>

    <script>
        const templates = [
            {
                id: 'sales-email',
                title: 'Sales Outreach Email',
                icon: '✉️',
                category: 'email',
                description: 'Initial outreach email to warm leads with personalization framework',
                meta: '15-20% expected response rate',
                file: 'templates/email-sales-outreach.md'
            },
            {
                id: 'followup-email',
                title: 'Follow-up Email',
                icon: '↩️',
                category: 'email',
                description: 'Second touch after initial outreach with no response',
                meta: '30-35% expected open rate',
                file: 'templates/email-follow-up.md'
            },
            {
                id: 'proposal',
                title: 'Project Proposal',
                icon: '📄',
                category: 'proposal',
                description: 'Complete proposal template with scope, timeline, and investment',
                meta: '60-75% expected acceptance rate',
                file: 'templates/proposal-project-scope.md'
            },
            {
                id: 'lead-nurturing',
                title: 'Lead Nurturing Playbook',
                icon: '🎯',
                category: 'playbook',
                description: '30-day email + content sequence to nurture leads to decision',
                meta: '15-25% expected conversion rate',
                file: 'templates/playbook-lead-nurturing.md'
            },
            {
                id: 'onboarding',
                title: 'Client Onboarding Playbook',
                icon: '🚀',
                category: 'playbook',
                description: '30-day onboarding checklist for successful client implementation',
                meta: '100% delivery target',
                file: 'templates/playbook-onboarding.md'
            }
        ];
        
        let currentFilter = 'all';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTemplates(templates);
        });
        
        function renderTemplates(items) {
            const grid = document.getElementById('templateGrid');
            
            if (items.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div style="font-size: 48px; margin-bottom: 12px;">📭</div>
                        <div>No templates match your search.</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = items.map(t => `
                <div class="template-card" data-category="${t.category}">
                    <div class="template-icon">${t.icon}</div>
                    <div class="template-title">${t.title}</div>
                    <div class="template-category">${t.category}</div>
                    <div class="template-description">${t.description}</div>
                    <div class="template-meta">📊 ${t.meta}</div>
                    <div class="template-actions">
                        <button class="btn btn-primary" onclick="openPreview('${t.id}')">
                            📖 Preview
                        </button>
                        <button class="btn btn-secondary" onclick="downloadTemplate('${t.file}')">
                            ⬇️ Download
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function filterByCategory(cat) {
            currentFilter = cat;
            updateFilterButtons(cat);
            filterTemplates();
        }
        
        function updateFilterButtons(active) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === active || 
                    (active === 'all' && btn.textContent === 'All')) {
                    btn.classList.add('active');
                }
            });
        }
        
        function filterTemplates() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = templates.filter(t => {
                const matchesCategory = currentFilter === 'all' || t.category === currentFilter;
                const matchesSearch = t.title.toLowerCase().includes(searchTerm) || 
                                    t.description.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });
            
            renderTemplates(filtered);
        }
        
        async function openPreview(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;
            
            try {
                const response = await fetch(template.file);
                const content = await response.text();
                
                document.getElementById('previewBody').innerHTML = `
                    <h2>${template.title}</h2>
                    ${markdownToHtml(content)}
                `;
                
                document.getElementById('previewModal').classList.add('open');
            } catch (error) {
                console.error('Failed to load template:', error);
                showMessage('Failed to load template. Try downloading instead.', 'error');
            }
        }
        
        function closePreview() {
            document.getElementById('previewModal').classList.remove('open');
        }
        
        function downloadTemplate(file) {
            const link = document.createElement('a');
            link.href = file;
            link.download = file.split('/').pop();
            link.click();
            showMessage('Template downloaded!', 'success');
        }
        
        function markdownToHtml(md) {
            // Simple markdown conversion
            return md
                .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
                .replace(/^## (.*?)$/gm, '<h2 style="margin-top: 20px;">$1</h2>')
                .replace(/^- (.*?)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" style="color: #667eea;">$1</a>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^((?!<).)/gm, '<p>$1');
        }
        
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = `message ${type}`;
            box.style.display = 'block';
            
            setTimeout(() => {
                box.style.display = 'none';
            }, 3000);
        }
        
        // Close modal on outside click
        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('previewModal')) {
                closePreview();
            }
        });
    </script>
</body>
</html>
