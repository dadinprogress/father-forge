<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father Forge - Infinity Gauntlet Mission Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            position: relative;
        }
        
        /* Cosmic Background */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: -2;
        }
        
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 40% 40%, rgba(26, 31, 58, 0.4) 0%, transparent 50%);
            animation: nebulaDrift 20s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes nebulaDrift {
            0% { transform: translateX(-5%) translateY(-5%); }
            50% { transform: translateX(2%) translateY(3%); }
            100% { transform: translateX(-5%) translateY(-5%); }
        }
        
        /* Stars */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .star.twinkle {
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        
        /* Container */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Header */
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        
        /* Gauntlet Container */
        .gauntlet-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        
        .gauntlet-svg {
            width: 100%;
            height: 100%;
            max-width: 700px;
            max-height: 700px;
        }
        
        .stone {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .stone:hover {
            filter: brightness(1.3);
        }
        
        /* Glow animations for each stone */
        @keyframes glowRed {
            0%, 100% { filter: drop-shadow(0 0 8px #FF4444) drop-shadow(0 0 12px #FF4444); }
            50% { filter: drop-shadow(0 0 20px #FF4444) drop-shadow(0 0 30px #FF4444); }
        }
        
        @keyframes glowOrange {
            0%, 100% { filter: drop-shadow(0 0 8px #FF8844) drop-shadow(0 0 12px #FF8844); }
            50% { filter: drop-shadow(0 0 20px #FF8844) drop-shadow(0 0 30px #FF8844); }
        }
        
        @keyframes glowYellow {
            0%, 100% { filter: drop-shadow(0 0 8px #FFCC44) drop-shadow(0 0 12px #FFCC44); }
            50% { filter: drop-shadow(0 0 20px #FFCC44) drop-shadow(0 0 30px #FFCC44); }
        }
        
        @keyframes glowGreen {
            0%, 100% { filter: drop-shadow(0 0 8px #44CC44) drop-shadow(0 0 12px #44CC44); }
            50% { filter: drop-shadow(0 0 20px #44CC44) drop-shadow(0 0 30px #44CC44); }
        }
        
        @keyframes glowBlue {
            0%, 100% { filter: drop-shadow(0 0 8px #4488FF) drop-shadow(0 0 12px #4488FF); }
            50% { filter: drop-shadow(0 0 20px #4488FF) drop-shadow(0 0 30px #4488FF); }
        }
        
        @keyframes glowPurple {
            0%, 100% { filter: drop-shadow(0 0 8px #CC44FF) drop-shadow(0 0 12px #CC44FF); }
            50% { filter: drop-shadow(0 0 20px #CC44FF) drop-shadow(0 0 30px #CC44FF); }
        }
        
        .stone[data-stone="mrr"] {
            animation: glowRed 2.5s ease-in-out infinite;
        }
        .stone[data-stone="leads"] {
            animation: glowOrange 2.5s ease-in-out infinite 0.5s;
        }
        .stone[data-stone="timeline"] {
            animation: glowYellow 2.5s ease-in-out infinite 1s;
        }
        .stone[data-stone="templates"] {
            animation: glowGreen 2.5s ease-in-out infinite 1.5s;
        }
        .stone[data-stone="calendar"] {
            animation: glowBlue 2.5s ease-in-out infinite 2s;
        }
        .stone[data-stone="system"] {
            animation: glowPurple 2.5s ease-in-out infinite 2.5s;
        }
        
        .stone:hover {
            animation-play-state: paused;
        }
        
        /* Stone hover pulse */
        .stone:hover {
            filter: drop-shadow(0 0 30px currentColor) brightness(1.4) !important;
        }
        
        /* Details Panel */
        .details-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: rgba(26, 31, 58, 0.95);
            border-left: 2px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            overflow-y: auto;
            z-index: 100;
            transform: translateX(400px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .details-panel.open {
            transform: translateX(0);
            opacity: 1;
        }
        
        .close-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 215, 0, 0.2);
            border: none;
            color: #FFD700;
            font-size: 24px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .close-panel:hover {
            background: rgba(255, 215, 0, 0.4);
        }
        
        .details-content {
            margin-top: 40px;
            animation: fadeIn 0.3s ease-out 0.2s both;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .detail-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .detail-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .detail-subtitle {
            color: rgba(255, 215, 0, 0.7);
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .detail-value {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .detail-description {
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .detail-action {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .detail-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 215, 0, 0.4);
        }
        
        /* Gauntlet fade on panel open */
        body.panel-open .gauntlet-container {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 20px;
            }
            
            .gauntlet-container {
                transform: scale(0.7);
                max-width: 400px;
            }
            
            .details-panel {
                width: 90vw;
                right: -90vw;
            }
            
            .details-panel.open {
                transform: translateX(0);
            }
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 18px;
            }
            
            .gauntlet-container {
                transform: scale(0.6);
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Cosmic Background -->
    <div class="cosmic-bg">
        <div class="nebula"></div>
        <div class="stars" id="starsContainer"></div>
    </div>
    
    <!-- Header -->
    <div class="header">
        <h1>⚡ Father Forge: Infinity Gauntlet</h1>
    </div>
    
    <!-- Gauntlet Container -->
    <div class="container">
        <div class="gauntlet-container">
            <svg class="gauntlet-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Red Stone (MRR) -->
                    <radialGradient id="redGradient">
                        <stop offset="0%" style="stop-color:#FF6666;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
                    </radialGradient>
                    
                    <!-- Orange Stone (Leads) -->
                    <radialGradient id="orangeGradient">
                        <stop offset="0%" style="stop-color:#FFAA66;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#FF6600;stop-opacity:1" />
                    </radialGradient>
                    
                    <!-- Yellow Stone (Timeline) -->
                    <radialGradient id="yellowGradient">
                        <stop offset="0%" style="stop-color:#FFDD66;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#FFAA00;stop-opacity:1" />
                    </radialGradient>
                    
                    <!-- Green Stone (Templates) -->
                    <radialGradient id="greenGradient">
                        <stop offset="0%" style="stop-color:#66DD66;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#00BB00;stop-opacity:1" />
                    </radialGradient>
                    
                    <!-- Blue Stone (Calendar) -->
                    <radialGradient id="blueGradient">
                        <stop offset="0%" style="stop-color:#6699FF;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#0055FF;stop-opacity:1" />
                    </radialGradient>
                    
                    <!-- Purple Stone (System) -->
                    <radialGradient id="purpleGradient">
                        <stop offset="0%" style="stop-color:#DD66FF;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#9900FF;stop-opacity:1" />
                    </radialGradient>
                </defs>
                
                <!-- Gauntlet outline (gold) -->
                <g id="gauntlet" opacity="0.7" stroke="#FFD700" stroke-width="3" fill="none" filter="url(#glow)">
                    <!-- Wrist band -->
                    <rect x="250" y="520" width="300" height="40" rx="8"/>
                    
                    <!-- Thumb -->
                    <path d="M 300 480 Q 280 400 280 280"/>
                    
                    <!-- Index finger -->
                    <path d="M 400 470 Q 400 380 400 200"/>
                    
                    <!-- Middle finger -->
                    <path d="M 500 470 Q 500 380 500 180"/>
                    
                    <!-- Ring finger -->
                    <path d="M 580 480 Q 600 400 600 280"/>
                </g>
                
                <!-- Energy connectors -->
                <g id="connectors" opacity="0.3" stroke="#FFD700" stroke-width="1" fill="none">
                    <line x1="280" y1="280" x2="350" y2="220"/>
                    <line x1="350" y1="220" x2="500" y2="180"/>
                    <line x1="500" y1="180" x2="600" y2="280"/>
                    <line x1="600" y1="280" x2="400" y2="370"/>
                    <line x1="400" y1="370" x2="280" y2="280"/>
                </g>
                
                <!-- Stones with exact positioning -->
                
                <!-- Red Stone - MRR -->
                <circle class="stone" data-stone="mrr" cx="350" cy="220" r="45" fill="url(#redGradient)" stroke="#FFD700" stroke-width="2"/>
                <text x="350" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">MRR</text>
                
                <!-- Orange Stone - Leads -->
                <circle class="stone" data-stone="leads" cx="500" cy="170" r="45" fill="url(#orangeGradient)" stroke="#FFD700" stroke-width="2"/>
                <text x="500" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">LEADS</text>
                
                <!-- Yellow Stone - Timeline -->
                <circle class="stone" data-stone="timeline" cx="600" cy="280" r="45" fill="url(#yellowGradient)" stroke="#FFD700" stroke-width="2"/>
                <text x="600" y="295" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">TIME</text>
                
                <!-- Green Stone - Templates -->
                <circle class="stone" data-stone="templates" cx="550" cy="420" r="45" fill="url(#greenGradient)" stroke="#FFD700" stroke-width="2"/>
                <text x="550" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">TMPL</text>
                
                <!-- Blue Stone - Calendar -->
                <circle class="stone" data-stone="calendar" cx="400" cy="450" r="45" fill="url(#blueGradient)" stroke="#FFD700" stroke-width="2"/>
                <text x="400" y="465" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">CAL</text>
                
                <!-- Purple Stone - System -->
                <circle class="stone" data-stone="system" cx="250" cy="330" r="45" fill="url(#purpleGradient)" stroke="#FFD700" stroke-width="2"/>
                <text x="250" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">FORGE</text>
            </svg>
        </div>
    </div>
    
    <!-- Details Panel -->
    <div class="details-panel" id="detailsPanel">
        <button class="close-panel" onclick="closePanel()">✕</button>
        <div class="details-content" id="detailsContent"></div>
    </div>

    <script>
        // Generate random stars with animation
        function generateStars() {
            const starsContainer = document.getElementById('starsContainer');
            for (let i = 0; i < 35; i++) {
                const star = document.createElement('div');
                star.className = 'star twinkle';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // Stone data with descriptions
        const stoneData = {
            mrr: {
                title: 'MRR',
                subtitle: 'Monthly Recurring Revenue',
                icon: '💰',
                link: 'financials.html',
                actionText: 'View Financials',
                loadData: () => {
                    try {
                        const financials = JSON.parse(localStorage.getItem('financials') || '{}');
                        const mrrValue = financials.entries && financials.entries.length > 0 
                            ? financials.entries[financials.entries.length - 1].mrr || 0 
                            : 0;
                        const percentage = ((mrrValue / 42000) * 100).toFixed(1);
                        return `$${mrrValue.toLocaleString()} (${percentage}% of $42k)`;
                    } catch {
                        return '$0 of $42,000';
                    }
                }
            },
            leads: {
                title: 'LEADS',
                subtitle: 'Active Pipeline',
                icon: '📊',
                link: 'index.html',
                actionText: 'Manage Leads',
                loadData: () => {
                    try {
                        const leads = JSON.parse(localStorage.getItem('leads') || '[]');
                        return leads.length + ' active prospects';
                    } catch {
                        return '0 prospects';
                    }
                }
            },
            timeline: {
                title: 'TIMELINE',
                subtitle: 'Mission Milestones',
                icon: '⏰',
                link: 'calendar.html',
                actionText: 'View Calendar',
                loadData: () => {
                    const today = new Date();
                    const april25 = new Date(2026, 3, 25);
                    const daysRemaining = Math.ceil((april25 - today) / (1000 * 60 * 60 * 24));
                    if (daysRemaining > 0) {
                        return daysRemaining + ' days to April 25';
                    } else if (daysRemaining === 0) {
                        return 'TODAY: April 25';
                    } else {
                        return 'Networking event complete';
                    }
                }
            },
            templates: {
                title: 'TEMPLATES',
                subtitle: 'Arsenal',
                icon: '🎯',
                link: 'templates.html',
                actionText: 'Access Arsenal',
                loadData: () => '5 battle-tested templates'
            },
            calendar: {
                title: 'CALENDAR',
                subtitle: 'Events & Sync',
                icon: '📅',
                link: 'calendar.html',
                actionText: 'Open Calendar',
                loadData: () => {
                    try {
                        const calendar = JSON.parse(localStorage.getItem('calendar') || '[]');
                        return (calendar.length || 0) + ' events synced';
                    } catch {
                        return 'Not synced yet';
                    }
                }
            },
            system: {
                title: 'SYSTEM',
                subtitle: 'Command State',
                icon: '⚡',
                link: 'dashboard.html',
                actionText: 'Send PING',
                loadData: () => 'OPERATIONAL'
            }
        };
        
        // Stone click handler
        document.querySelectorAll('.stone').forEach(stone => {
            stone.addEventListener('click', function() {
                const stoneType = this.dataset.stone;
                const data = stoneData[stoneType];
                const detailValue = data.loadData();
                
                const detailsContent = document.getElementById('detailsContent');
                detailsContent.innerHTML = `
                    <div class="detail-icon">${data.icon}</div>
                    <h2 class="detail-title">${data.title}</h2>
                    <p class="detail-subtitle">${data.subtitle}</p>
                    <div class="detail-value">${detailValue}</div>
                    <a href="${data.link}" class="detail-action">${data.actionText} →</a>
                `;
                
                document.getElementById('detailsPanel').classList.add('open');
                document.body.classList.add('panel-open');
            });
        });
        
        function closePanel() {
            document.getElementById('detailsPanel').classList.remove('open');
            document.body.classList.remove('panel-open');
        }
        
        // Close panel on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePanel();
        });
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            generateStars();
        });
    </script>
</body>
</html>
